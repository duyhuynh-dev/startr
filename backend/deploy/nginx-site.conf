# Optional: Nginx reverse proxy for HTTPS
# Use after: sudo apt install nginx certbot python3-certbot-nginx
# 1. Point DNS A record (e.g. api.yourdomain.com) to this server's Elastic IP
# 2. Copy: sudo cp deploy/nginx-site.conf /etc/nginx/sites-available/startr-api
# 3. Edit: replace api.yourdomain.com with your domain
# 4. Enable: sudo ln -s /etc/nginx/sites-available/startr-api /etc/nginx/sites-enabled/
# 5. SSL: sudo certbot --nginx -d api.yourdomain.com
# 6. Test: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:8012;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
